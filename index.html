<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>虹学 七夕の願い</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="app">

    <header>
      <div class="bamboo">🎋</div>

      <h1>虹学 七夕の願い</h1>

      <p>
        夜空に願いを。<br>
        みんなの短冊を覗いてみよう。
      </p>

      <div class="total">
        ♥ みんなのいいね
        <strong id="totalLikes">0</strong>
      </div>
    </header>


    <section class="carousel-wrap">

      <button
        id="prev"
        class="arrow left"
        type="button"
        aria-label="前の願い"
      >
        ‹
      </button>

      <div id="carousel" class="carousel">
        <div class="loading">
          願い事を読み込んでいます…
        </div>
      </div>

      <button
        id="next"
        class="arrow right"
        type="button"
        aria-label="次の願い"
      >
        ›
      </button>

    </section>


    <p class="hint">
      ← 横にスワイプして、みんなの願いを見てみよう →<br>
      気になる願いには ♥ を送れます
    </p>


    <div class="sort">

      <button
        class="active"
        type="button"
        data-sort="new"
      >
        新着順
      </button>

      <button
        type="button"
        data-sort="likes"
      >
        いいね順
      </button>

    </div>


    <section class="event">

      <strong>🎋 七夕限定イベント</strong>

      <span>
        虹学のみんなで、願い事を書いてみよう。
      </span>

      <span>
        投稿された願いは、このページにリアルタイムで表示されます。
      </span>

    </section>


    <section class="form-card">

      <h2>短冊を書く</h2>

      <form id="wishForm">

        <label>
          名前

          <input
            id="name"
            type="text"
            maxlength="30"
            placeholder="名前を入力"
            required
          >
        </label>


        <label>
          学年

          <select id="grade" required>

            <option value="">
              学年を選択
            </option>

            <option value="1年生">
              1年生
            </option>

            <option value="2年生">
              2年生
            </option>

            <option value="3年生">
              3年生
            </option>

            <option value="教職員">
              教職員
            </option>

          </select>

        </label>


        <label>
          願い事

          <textarea
            id="wish"
            maxlength="150"
            placeholder="あなたの願い事を書いてください"
            required
          ></textarea>

        </label>


        <button type="submit">
          願いを短冊に込める
        </button>

      </form>


      <p id="status"></p>

    </section>

  </main>


  <script
    type="module"
    src="script.js"
  ></script>

</body>
</html>
